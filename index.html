<script>
var scripts = [
  "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
];
var idx = 0;
function loadNext() {
  if (idx >= scripts.length) { startApp(); return; }
  var s = document.createElement('script');
  s.src = scripts[idx++];
  s.onload = loadNext;
  s.onerror = function() {
    document.getElementById('loading').innerHTML = '<div>❌ Erreur réseau</div><div style="font-size:13px;color:#64748b">Vérifie ta connexion et recharge</div>';
  };
  document.head.appendChild(s);
}
function startApp() {
  try {
    var appCode = document.getElementById('app-code').textContent;
    var transformed = Babel.transform(appCode, { presets: ['react'] }).code;
    eval(transformed);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('root').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div>❌ Erreur: ' + e.message.substring(0,120) + '</div>';
    console.error(e);
  }
}
loadNext();
</script>
<script id="app-code" type="text/plain">
const { useState, useEffect } = React;


// ── PLAN (déficit & poids cible par semaine) ──────────────────────────────────
// cibleKcalJours : objectif calorique par jour [Lun, Mar, Mer, Jeu, Ven, Sam, Dim]
// Phase 1 : maintenance 1750 tous les jours
// Phase 2 : 2 jours repos à 1550, 5 jours sport à 1650
// Phase 3 : 1 jour repos à 1550, 5 jours sport à 1650, 1 jour sortie longue à 2000
// Vacances : 2000 tous les jours

const P2 = [1650, 1650, 1550, 1650, 1650, 1550, 1650]; // Phase 2 : repos mer+sam
const P3 = [1650, 1650, 1550, 1650, 1650, 2000, 1650]; // Phase 3 : repos mer, SL sam
const VAC = [2000, 2000, 2000, 2000, 2000, 2000, 2000];
const PH1 = [1750, 1750, 1750, 1750, 1750, 1750, 1750];
const AFF = [1900, 1900, 1900, 1900, 1900, 1900, 1900];

// Déficit calorique cible par semaine (kcal) basé sur notre plan
const DEFICIT_CIBLE = {
  1:0, 2:0, 3:2128, 4:2128, 5:2128, 6:2128,
  7:2214, 8:2214, 9:2214, 10:2214, 11:2716,
  12:0, 13:0,
  14:2596, 15:2596,
  16:2453, 17:2453, 18:2453, 19:2453, 20:2453, 21:2453,
  22:0,
};

const PLAN = [
  { sem: 1,  lundi: "25 mai",    phase: "Phase 1",  cibleKcalJours: PH1, ciblePoids: 70.0, sessionsTargets: 2 },
  { sem: 2,  lundi: "1 juin",    phase: "Phase 1",  cibleKcalJours: PH1, ciblePoids: 70.0, sessionsTargets: 2 },
  { sem: 3,  lundi: "8 juin",    phase: "Phase 2",  cibleKcalJours: P2,  ciblePoids: 70.0, sessionsTargets: 5 },
  { sem: 4,  lundi: "15 juin",   phase: "Phase 2",  cibleKcalJours: P2,  ciblePoids: 69.7, sessionsTargets: 5 },
  { sem: 5,  lundi: "22 juin",   phase: "Phase 2",  cibleKcalJours: P2,  ciblePoids: 69.4, sessionsTargets: 5 },
  { sem: 6,  lundi: "29 juin",   phase: "Phase 2",  cibleKcalJours: P2,  ciblePoids: 69.2, sessionsTargets: 5 },
  { sem: 7,  lundi: "6 juil",    phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 68.9, sessionsTargets: 6 },
  { sem: 8,  lundi: "13 juil",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 68.6, sessionsTargets: 6 },
  { sem: 9,  lundi: "20 juil",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 68.3, sessionsTargets: 6 },
  { sem: 10, lundi: "27 juil",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 68.0, sessionsTargets: 6 },
  { sem: 11, lundi: "3 août",    phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 67.7, sessionsTargets: 6 },
  { sem: 12, lundi: "10 août",   phase: "Vacances", cibleKcalJours: VAC, ciblePoids: 67.4, sessionsTargets: 4 },
  { sem: 13, lundi: "17 août",   phase: "Vacances", cibleKcalJours: VAC, ciblePoids: 67.4, sessionsTargets: 4 },
  { sem: 14, lundi: "24 août",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 67.4, sessionsTargets: 6 },
  { sem: 15, lundi: "31 août",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 67.1, sessionsTargets: 6 },
  { sem: 16, lundi: "7 sept",    phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 66.7, sessionsTargets: 6 },
  { sem: 17, lundi: "14 sept",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 66.4, sessionsTargets: 6 },
  { sem: 18, lundi: "21 sept",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 66.1, sessionsTargets: 6 },
  { sem: 19, lundi: "28 sept",   phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 65.8, sessionsTargets: 6 },
  { sem: 20, lundi: "5 oct",     phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 65.5, sessionsTargets: 6 },
  { sem: 21, lundi: "12 oct",    phase: "Phase 3",  cibleKcalJours: P3,  ciblePoids: 65.1, sessionsTargets: 6 },
  { sem: 22, lundi: "19 oct",    phase: "Phase 3",  cibleKcalJours: AFF, ciblePoids: 64.8, sessionsTargets: 3 },

const JOURS = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
const PHASE_COLORS = {
  "Phase 1": "#64748b", "Phase 2": "#f59e0b",
  "Phase 3": "#6366f1", "Vacances": "#10b981",
};

const EMPTY_JOUR = () => ({
  sportFait: "",
  garminKcal: "",
  kCalTotales: "",
  petitDejText: "", dejeunerText: "", collationText: "", dinerText: "",
  petitDejMacros: null, dejeunerMacros: null, collationMacros: null, dinerMacros: null,
});

const EMPTY_WEEK = () => ({
  poidsLundi: "",
  planningSport: ["", "", "", "", "", "", ""],
  jours: Array(7).fill(null).map(() => EMPTY_JOUR()),
});



// ── CALCUL DYNAMIQUE DES OBJECTIFS CALORIQUES ────────────────────────────────
// Détecte le type de session depuis le texte du planning
function detectSessionType(text) {
  if (!text || text.trim() === "" || /repos|rest|off|rien/i.test(text)) return "repos";
  if (/sortie.?long|long.?run|sl\b|1h[23456]|1h[23456]0/i.test(text)) return "longue";
  return "sport";
}

function getCibleKcalDynamique(plan, planningSport) {
  // Phase 1 et Vacances : objectifs fixes
  if (plan.phase === "Phase 1" || plan.phase === "Vacances") return plan.cibleKcalJours;

  // Phase 2 : 1550 si repos, 1650 sinon (pas de sortie longue)
  if (plan.phase === "Phase 2") {
    return planningSport.map(s => {
      const type = detectSessionType(s);
      return type === "repos" ? 1550 : 1650;
    });
  }

  // Phase 3 : 1550 repos, 2000 sortie longue, 1650 sport normal
  return planningSport.map(s => {
    const type = detectSessionType(s);
    if (type === "repos") return 1550;
    if (type === "longue") return 2000;
    return 1650;
  });
}

// ── NUTRITION PANEL with AI macro calculation ─────────────────────────────────
function NutritionPanel({ jour, activeJour, activeSem, cibleKcal, deficitCibleJour, updateJour }) {
  const repas = [
    { key: "petitDejMacros", label: "🌅 Petit déj" },
    { key: "dejeunerMacros",  label: "☀️ Déjeuner" },
    { key: "collationMacros", label: "🍎 Collation" },
    { key: "dinerMacros",     label: "🌙 Dîner" },
  ];

  // Total : priorité total manuel > somme repas
  const sommeRepas = repas.reduce((acc, r) => acc + (jour[r.key]?.kcal || 0), 0);
  const totalManuel = parseFloat(jour.kCalTotales) || 0;
  const totalEffectif = totalManuel > 0 ? totalManuel : sommeRepas;
  const hasTotaux = totalEffectif > 0;

  // Budget basé sur Garmin si dispo
  const garmin = parseFloat(jour.garminKcal) || 0;
  const budgetMax = garmin > 0 ? Math.round(garmin - (deficitCibleJour || 0)) : cibleKcal;
  const restant = budgetMax - totalEffectif;
  const kcalOk = hasTotaux && totalEffectif <= budgetMax + 80;

  return (
    <div style={{ background: "#1e293b", borderRadius: 14, padding: "16px 20px", border: "1px solid #334155" }}>
      {/* Header budget */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 600 }}>🍽️ Nutrition</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {garmin > 0 ? (
            <>
              <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, background: "#10b98122", color: "#10b981" }}>
                ⌚ Brûlé : {garmin} kcal
              </span>
              <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, background: "#f59e0b22", color: "#f59e0b" }}>
                🎯 Déficit : {deficitCibleJour} kcal
              </span>
              <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 700, background: "#6366f122", color: "#6366f1" }}>
                💡 Budget : {budgetMax} kcal
              </span>
            </>
          ) : (
            <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, background: "#6366f122", color: "#6366f1" }}>
              🎯 Objectif : {cibleKcal} kcal
            </span>
          )}
          {hasTotaux && (
            <span style={{
              padding: "2px 8px", borderRadius: 99, fontSize: 11, fontWeight: 700,
              background: kcalOk ? "#064e3b" : "#450a0a",
              color: kcalOk ? "#6ee7b7" : "#fca5a5",
            }}>{totalEffectif} kcal {kcalOk ? "✓" : "✗"}</span>
          )}
        </div>
      </div>

      {/* Barre de progression */}
      {hasTotaux && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <div style={{ flex: 1, background: "#0f172a", borderRadius: 99, height: 6, overflow: "hidden" }}>
            <div style={{
              height: "100%", borderRadius: 99,
              width: `${Math.min((totalEffectif / budgetMax) * 100, 100)}%`,
              background: totalEffectif > budgetMax ? "#ef4444" : totalEffectif > budgetMax * 0.9 ? "#f59e0b" : "#10b981",
              transition: "width 0.3s",
            }} />
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, whiteSpace: "nowrap",
            color: totalEffectif > budgetMax ? "#ef4444" : totalEffectif > budgetMax * 0.9 ? "#f59e0b" : "#10b981" }}>
            {restant >= 0 ? `reste ${restant}` : `dépassé ${Math.abs(restant)}`}
          </span>
        </div>
      )}

      {/* Saisie par repas */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
        {repas.map(r => {
          const val = jour[r.key]?.kcal || "";
          return (
            <div key={r.key}>
              <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>{r.label}</div>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <input type="number"
                  value={val}
                  onChange={e => {
                    const v = parseInt(e.target.value) || 0;
                    updateJour(activeSem, activeJour, r.key, v > 0 ? { kcal: v, prot: 0, gluc: 0, lip: 0 } : null);
                  }}
                  placeholder="kcal"
                  style={{
                    flex: 1, padding: "8px 8px", borderRadius: 8,
                    border: `1px solid ${val ? "#6366f1" : "#334155"}`,
                    background: "#0f172a", color: "#f8fafc", fontSize: 13, fontFamily: "inherit",
                  }}
                />
              </div>
            </div>
          );
        })}
      </div>

      {/* Total journée direct */}
      <div style={{ borderTop: "1px solid #1e293b", paddingTop: 12, display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 12, color: "#64748b", whiteSpace: "nowrap" }}>📅 Total journée</span>
        <input type="number"
          value={jour.kCalTotales}
          onChange={e => updateJour(activeSem, activeJour, "kCalTotales", e.target.value)}
          placeholder="ou total direct"
          style={{
            width: 120, padding: "8px 10px", borderRadius: 8,
            border: `1.5px solid ${jour.kCalTotales ? "#10b981" : "#334155"}`,
            background: "#0f172a", color: "#f8fafc", fontSize: 13, fontFamily: "inherit",
          }}
        />
        <span style={{ fontSize: 12, color: "#64748b" }}>kcal</span>
        {sommeRepas > 0 && !totalManuel && (
          <span style={{ fontSize: 11, color: "#6366f1" }}>Somme : {sommeRepas} kcal</span>
        )}
      </div>
    </div>
  );
}


function App() {
  const [data, setData] = useState({});
  const [activeSem, setActiveSem] = useState(1);
  const [activeTab, setActiveTab] = useState("saisie");
  const [activeJour, setActiveJour] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [loadingMacros, setLoadingMacros] = useState({});
  const [showExport, setShowExport] = useState(false);
  const [importText, setImportText] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [copyMsg, setCopyMsg] = useState("");

  useEffect(() => {
    try {
      const saved = localStorage.getItem("suivi-marathon-v1");
      if (saved) setData(JSON.parse(saved));
    } catch(e) {}
    setLoaded(true);
  }, []);

  const save = (newData) => {
    setData(newData);
    try { localStorage.setItem("suivi-marathon-v1", JSON.stringify(newData)); } catch(e) {}
  };

  const resetAll = () => {
    if (!window.confirm("Effacer toutes les données ?")) return;
    try { localStorage.removeItem("suivi-marathon-v1"); } catch {}
    save({});
    setCopyMsg("✅ Toutes les données effacées !");
  };

  const resetWeek = (sem) => {
    const newData = { ...data };
    delete newData[sem];
    save(newData);
    setCopyMsg("✅ Semaine S" + sem + " réinitialisée !");
  };

  // Export — copier dans le presse-papier
  const exportData = async () => {
    const txt = JSON.stringify(data);
    try {
      await navigator.clipboard.writeText(txt);
      setCopyMsg("✅ Copié ! Colle-le dans Notes ou un doc.");
    } catch {
      setShowExport(true);
    }
  };

  // Import — coller depuis le presse-papier
  const importData = async () => {
    try {
      const txt = await navigator.clipboard.readText();
      const parsed = JSON.parse(txt);
      save(parsed);
      setCopyMsg("✅ Données importées !");
      setShowImport(false);
    } catch {
      setShowImport(true);
    }
  };

  const doImportText = async () => {
    try {
      const parsed = JSON.parse(importText);
      save(parsed);
      setCopyMsg("✅ Données importées !");
      setShowImport(false);
      setImportText("");
    } catch {
      setCopyMsg("❌ Texte invalide, réessaie.");
    }
  };

  const getWeek = (s) => data[s] || EMPTY_WEEK();

  const updateJour = (sem, jour, field, val) => {
    const w = { ...getWeek(sem) };
    w.jours = w.jours.map((j, i) => i === jour ? { ...j, [field]: val } : j);
    save({ ...data, [sem]: w });
  };

  const updateWeek = (sem, field, val) => {
    const w = { ...getWeek(sem) };
    w[field] = val;
    save({ ...data, [sem]: w });
  };

  const updatePlanning = (sem, jour, val) => {
    const w = { ...getWeek(sem) };
    w.planningSport = w.planningSport.map((v, i) => i === jour ? val : v);
    save({ ...data, [sem]: w });
  };

  // KPI calc
  const kpiSem = (s) => {
    const plan = PLAN[s - 1];
    const w = getWeek(s);
    const joursData = w.jours;

    // Poids
    const poids = parseFloat(w.poidsLundi) || null;
    const poidsOk = poids !== null && poids <= plan.ciblePoids + 0.2;

    // Objectifs caloriques dynamiques selon planning sport
    const cibleKcalDyn = getCibleKcalDynamique(plan, w.planningSport);

    // Calories — objectif par jour
    const kcals = joursData.map(j => {
      const tot = parseFloat(j.kCalTotales);
      if (!isNaN(tot) && tot > 0) return tot;
      // Somme des macros calculés par repas
      const macros = [j.petitDejMacros, j.dejeunerMacros, j.collationMacros, j.dinerMacros];
      const sum = macros.reduce((a, m) => a + (m?.kcal || 0), 0);
      return sum > 0 ? sum : null;
    });
    const kcalsValides = kcals.filter(k => k !== null);
    const moyKcal = kcalsValides.length ? Math.round(kcalsValides.reduce((a, b) => a + b, 0) / kcalsValides.length) : null;
    // Objectif moyen de la semaine
    const cibleMoyenne = Math.round(cibleKcalDyn.reduce((a, b) => a + b, 0) / 7);
    const kcalOk = moyKcal !== null && moyKcal <= cibleMoyenne + 50;

    // Sport — compare planning vs fait
    const planSessions = w.planningSport.filter(v => v.trim() !== "").length;
    const faitSessions = joursData.filter(j => j.sportFait.trim() !== "").length;
    const sportOk = planSessions === 0 ? null : faitSessions >= planSessions;

    // Par jour : vert si déficit du jour atteint
    // déficit jour = garmin brûlé - kcal mangées >= déficit cible journalier
    const deficitCibleJour = Math.round((DEFICIT_CIBLE[s] || 0) / 7);
    const joursOk = joursData.map((j, i) => {
      const kcal = kcals[i];
      const garmin = parseFloat(j.garminKcal) || null;
      const cibleJour = cibleKcalDyn[i];
      const planSport = w.planningSport[i]?.trim() !== "";
      const faitSport = j.sportFait.trim() !== "";

      if (!kcal && !planSport) return null; // pas de données

      // Sport planifié mais pas fait → rouge
      if (planSport && !faitSport) return false;

      if (kcal) {
        if (garmin !== null) {
          // On a Garmin : on vérifie le déficit réel du jour
          const deficitJour = garmin - kcal;
          return deficitJour >= deficitCibleJour - 50;

                </span>
                <span style={{ fontSize: 11, color: "#6366f1", display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: "#6366f1" }}/>
                  Poids mesuré
                </span>
              </div>
              {(() => {
                const chartData = PLAN.map(p => {
                  const w = getWeek(p.sem);
                  return {
                    sem: "S"+p.sem,
                    objectif: p.ciblePoids,
                    estime: p.ciblePoids, // même que objectif = poids estimé selon plan
                    mesure: parseFloat(w.poidsLundi) || null,
                  };
                });
                const W = 600, H = 220;
                const pad = { t: 10, r: 20, b: 30, l: 44 };
                const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
                const yMin = 62, yMax = 71;
                const xS = i => pad.l + (i / (chartData.length - 1)) * cW;
                const yS = v => pad.t + cH - ((v - yMin) / (yMax - yMin)) * cH;
                const segs = (key) => {
                  const s = []; let cur = [];
                  chartData.forEach((d, i) => {
                    if (d[key] != null) cur.push(xS(i)+","+yS(d[key]));
                    else if (cur.length) { s.push(cur); cur = []; }
                  });
                  if (cur.length) s.push(cur);
                  return s;
                };
                return (
                  <svg viewBox={"0 0 "+W+" "+H} style={{ width: "100%", height: H }}>
                    {[0,0.25,0.5,0.75,1].map(t => {
                      const y = pad.t + t * cH;
                      const v = (yMax - t*(yMax-yMin)).toFixed(1);
                      return <g key={t}>
                        <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#1e293b" strokeWidth="1"/>
                        <text x={pad.l-4} y={y+4} textAnchor="end" fill="#64748b" fontSize="10">{v}</text>
                      </g>;
                    })}
                    {chartData.filter((_,i) => i % 3 === 0).map((d,_,arr) => {
                      const i = chartData.indexOf(d);
                      return <text key={i} x={xS(i)} y={H-6} textAnchor="middle" fill="#64748b" fontSize="10">{d.sem}</text>;
                    })}
                    {/* Objectif plan */}
                    {segs("objectif").map((s,i) => <polyline key={"o"+i} points={s.join(" ")} fill="none" stroke="#334155" strokeWidth="1.5" strokeDasharray="4,4"/>)}
                    {/* Poids estimé */}
                    {segs("estime").map((s,i) => <polyline key={"e"+i} points={s.join(" ")} fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="6,3"/>)}
                    {/* Poids mesuré */}
                    {segs("mesure").map((s,i) => <polyline key={"m"+i} points={s.join(" ")} fill="none" stroke="#6366f1" strokeWidth="2.5"/>)}
                    {chartData.map((d,i) => d.mesure != null ? (
                      <circle key={"dot"+i} cx={xS(i)} cy={yS(d.mesure)} r="5" fill="#6366f1"/>
                    ) : null)}
                  </svg>
                );
              })()}
            </div>

            {/* Sport */}
            <div style={{ background: "#1e293b", borderRadius: 14, padding: "20px", border: "1px solid #334155" }}>
              <div style={{ fontSize: 14, color: "#f8fafc", fontWeight: 600, marginBottom: 16 }}>
                🏃 Sessions sport réalisées vs planifiées
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {PLAN.map(p => {
                  const k = kpiSem(p.sem);
                  if (k.planSessions === 0) return null;
                  const pct = k.planSessions > 0 ? (k.faitSessions / k.planSessions) : 0;
                  return (
                    <div key={p.sem} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 30, fontSize: 11, color: "#64748b" }}>S{p.sem}</div>
                      <div style={{ flex: 1, background: "#0f172a", borderRadius: 4, height: 16, overflow: "hidden" }}>
                        <div style={{
                          height: "100%", borderRadius: 4,
                          width: `${Math.min(pct * 100, 100)}%`,
                          background: pct >= 1 ? "#10b981" : pct > 0.5 ? "#f59e0b" : "#ef4444",
                          transition: "width 0.4s",
                        }} />
                      </div>
                      <div style={{ width: 40, fontSize: 11, color: "#94a3b8", textAlign: "right" }}>
                        {k.faitSessions}/{k.planSessions}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* Message copie */}
        {copyMsg && (
          <div style={{
            position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
            background: "#1e293b", border: "1px solid #334155", borderRadius: 12,
            padding: "12px 20px", fontSize: 13, color: "#e2e8f0", zIndex: 100,
            display: "flex", gap: 12, alignItems: "center", boxShadow: "0 8px 32px #0008",
          }}>
            {copyMsg}
            <button onClick={() => setCopyMsg("")} style={{
              background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 16,
            }}>✕</button>
          </div>
        )}

        {/* Modal export texte (fallback si clipboard bloqué) */}
        {showExport && (
          <div style={{
            position: "fixed", inset: 0, background: "#000a", zIndex: 200,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }}>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, maxWidth: 500, width: "100%" }}>
              <div style={{ fontSize: 15, color: "#f8fafc", fontWeight: 600, marginBottom: 12 }}>
                💾 Sauvegarde manuelle
              </div>
              <p style={{ fontSize: 13, color: "#94a3b8", marginBottom: 12 }}>
                Copie ce texte et colle-le dans Notes ou un email à toi-même :
              </p>
              <textarea
                readOnly
                value={JSON.stringify(data)}
                rows={6}
                style={{
                  width: "100%", padding: 10, borderRadius: 8, background: "#0f172a",
                  border: "1px solid #334155", color: "#94a3b8", fontSize: 11,
                  fontFamily: "monospace", boxSizing: "border-box", resize: "none",
                }}
                onFocus={e => e.target.select()}
              />
              <button onClick={() => setShowExport(false)} style={{
                marginTop: 12, padding: "8px 20px", borderRadius: 8, border: "none",
                background: "#6366f1", color: "white", cursor: "pointer", fontFamily: "inherit",
              }}>Fermer</button>
            </div>
          </div>
        )}

        {/* Modal import texte (fallback si clipboard bloqué) */}
        {showImport && (
          <div style={{
            position: "fixed", inset: 0, background: "#000a", zIndex: 200,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }}>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, maxWidth: 500, width: "100%" }}>
              <div style={{ fontSize: 15, color: "#f8fafc", fontWeight: 600, marginBottom: 12 }}>
                📂 Charger mes données
              </div>
              <p style={{ fontSize: 13, color: "#94a3b8", marginBottom: 12 }}>
                Colle ici le texte sauvegardé précédemment :
              </p>
              <textarea
                value={importText}
                onChange={e => setImportText(e.target.value)}
                rows={6}
                placeholder='Colle ton JSON ici...'
                style={{
                  width: "100%", padding: 10, borderRadius: 8, background: "#0f172a",
                  border: "1px solid #334155", color: "#e2e8f0", fontSize: 11,
                  fontFamily: "monospace", boxSizing: "border-box", resize: "none",
                }}
              />
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={doImportText} style={{
                  flex: 1, padding: "8px 20px", borderRadius: 8, border: "none",
                  background: "#6366f1", color: "white", cursor: "pointer", fontFamily: "inherit",
                }}>Importer</button>
                <button onClick={() => setShowImport(false)} style={{
                  padding: "8px 20px", borderRadius: 8, border: "1px solid #334155",
                  background: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit",
                }}>Annuler</button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
