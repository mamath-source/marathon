<body>
<div id="loading">
  <div>🏃 Chargement...</div>
  <div style="font-size:13px;color:#475569">Première ouverture : quelques secondes</div>
</div>

<div id="root" style="display:none"></div>

<script>
var scripts = [
  "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
];

var idx = 0;

function loadNext() {
  if (idx >= scripts.length) {
    startApp();
    return;
  }

  var s = document.createElement("script");
  s.src = scripts[idx++];
  s.onload = loadNext;
  s.onerror = function() {
    document.getElementById("loading").innerHTML =
      '<div>❌ Erreur réseau</div><div style="font-size:13px;color:#64748b">Vérifie ta connexion et recharge</div>';
  };
  document.head.appendChild(s);
}

function startApp() {
  try {
    var appCode = document.getElementById("app-code").textContent;
    var transformed = Babel.transform(appCode, { presets: ["react"] }).code;
    eval(transformed);

    document.getElementById("loading").style.display = "none";
    document.getElementById("root").style.display = "block";
  } catch(e) {
    document.getElementById("loading").innerHTML =
      '<div>❌ Erreur : ' + e.message.substring(0, 140) + '</div>';
    console.error(e);
  }
}

loadNext();
</script>

<script id="app-code" type="text/plain">
const { useState, useEffect } = React;

const STORAGE_KEY = "suivi-marathon-v2";

const MARATHON = [1650, 1650, 1550, 1650, 1650, 2000, 1650];
const VACANCES = [2000, 2000, 2000, 2000, 2000, 2000, 2000];

// Phase toujours "Marathon", mais sortie longue réduite en fin de préparation.
const MARATHON_FIN = [1650, 1650, 1550, 1650, 1650, 1900, 1650];

const DEFICIT_CIBLE = {

  6: 0, 7: 0,
  8: 2426, 9: 2426, 10: 2426, 11: 2426, 12: 2426, 13: 2426,

const PLAN = [
  { sem: 1,  lundi: "6 juil",  phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 69.60, sessionsTargets: 4 },
  { sem: 2,  lundi: "13 juil", phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 69.28, sessionsTargets: 4 },

  { sem: 8,  lundi: "24 août", phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 68.02, sessionsTargets: 4 },
  { sem: 9,  lundi: "31 août", phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 67.71, sessionsTargets: 4 },
  { sem: 10, lundi: "7 sept",  phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 67.39, sessionsTargets: 4 },
  { sem: 11, lundi: "14 sept", phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 67.08, sessionsTargets: 4 },
  { sem: 12, lundi: "21 sept", phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 66.76, sessionsTargets: 4 },
  { sem: 13, lundi: "28 sept", phase: "Marathon", cibleKcalJours: MARATHON,     ciblePoids: 66.45, sessionsTargets: 4 },

  { sem: 14, lundi: "5 oct",   phase: "Marathon", cibleKcalJours: MARATHON_FIN, ciblePoids: 66.13, sessionsTargets: 3 },
  { sem: 15, lundi: "12 oct",  phase: "Marathon", cibleKcalJours: MARATHON_FIN, ciblePoids: 65.82, sessionsTargets: 3 },
  { sem: 16, lundi: "19 oct",  phase: "Marathon", cibleKcalJours: MARATHON_FIN, ciblePoids: 65.50, sessionsTargets: 2 },
];

const JOURS = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

const PHASE_COLORS = {
  Marathon: "#6366f1",
  Vacances: "#10b981",
};

const SESSION_DEFS = {
  EF:  { label: "EF",  desc: "Endurance fondamentale", color: "#10b981", cat: "course" },
  SL:  { label: "SL",  desc: "Sortie longue",           color: "#059669", cat: "course" },
  VMA: { label: "VMA", desc: "Vitesse maximale",         color: "#34d399", cat: "course" },
  RJ:  { label: "RJ",  desc: "Renfo jambes",             color: "#8b5cf6", cat: "renfo" },
  RA:  { label: "RA",  desc: "Renfo bras",               color: "#a855f7", cat: "renfo" },
  RB:  { label: "RB",  desc: "Renfo bras B",             color: "#7c3aed", cat: "renfo" },
  RAB: { label: "RAB", desc: "Renfo bras + jambes",      color: "#6d28d9", cat: "renfo" },
  AUTRE: { label: "Autre", desc: "Autre sport",          color: "#f59e0b", cat: "autre" },
};

const EMPTY_JOUR = () => ({
  sessionsFaites: [],
  garminKcal: "",
  kCalTotales: "",
});

const EMPTY_WEEK_SPORT = () => ({
  planningJours: Array.from({ length: 7 }, () => []),
});

const EMPTY_WEEK = () => ({
  poidsLundi: "",
  sport: EMPTY_WEEK_SPORT(),
  jours: Array.from({ length: 7 }, () => EMPTY_JOUR()),
});

function normalizeWeek(rawWeek) {
  const empty = EMPTY_WEEK();
  const raw = rawWeek || {};

  return {
    ...empty,
    ...raw,
    sport: {
      ...empty.sport,
      ...(raw.sport || {}),
      planningJours: Array.from({ length: 7 }, (_, i) =>
        raw.sport?.planningJours?.[i] || []
      ),
    },
    jours: Array.from({ length: 7 }, (_, i) => ({
      ...EMPTY_JOUR(),
      ...(raw.jours?.[i] || {}),
      sessionsFaites: raw.jours?.[i]?.sessionsFaites || [],
    })),
  };
}

function hasWeekData(rawWeek) {
  if (!rawWeek) return false;

  const w = normalizeWeek(rawWeek);

  if (w.poidsLundi) return true;
  if (w.sport?.planningJours?.some(j => j && j.length > 0)) return true;

  return w.jours.some(j =>
    j.garminKcal ||
    j.kCalTotales ||
    (j.sessionsFaites && j.sessionsFaites.length > 0)
  );
}

function getCibleKcalDynamique(plan, weekSport) {
  if (plan.phase === "Vacances") {
    return plan.cibleKcalJours;
  }

  const planningJours = weekSport?.planningJours || Array.from({ length: 7 }, () => []);

  return planningJours.map((jour, i) => {
    const sessions = jour || [];

    if (sessions.length === 0) return 1550;

    if (sessions.includes("SL")) {
      return plan.cibleKcalJours?.[i] ?? 2000;
    }

    return plan.cibleKcalJours?.[i] ?? 1650;
  });
}

function count(arr, code) {
  return (arr || []).filter(x => x === code).length;
}

function badge(ok, txt) {
  return (
    <span style={{
      padding: "3px 10px",
      borderRadius: 99,
      fontSize: 12,
      fontWeight: 600,
      background: ok === true ? "#d1fae5" : ok === false ? "#fee2e2" : "#f1f5f9",
      color: ok === true ? "#065f46" : ok === false ? "#991b1b" : "#64748b",
      border: `1px solid ${ok === true ? "#6ee7b7" : ok === false ? "#fca5a5" : "#e2e8f0"}`,
      whiteSpace: "nowrap",
    }}>
      {txt}
    </span>
  );
}

function dot(ok) {
  return ok === true ? "🟢" : ok === false ? "🔴" : "⚪";
}

function WeekSummary({ weekSport, joursData }) {
  const planningJours = weekSport?.planningJours || Array.from({ length: 7 }, () => []);
  const prevues = planningJours.flat();
  const faites = (joursData || []).flatMap(j => j.sessionsFaites || []);

  const courseOk =
    count(faites, "EF") >= 1 &&
    faites.includes("SL") &&
    faites.includes("VMA");

  const renfoOk =
    faites.includes("RJ") ||
    (faites.includes("RA") && faites.includes("RB")) ||
    faites.includes("RAB");

  const boxes = [
    { code: "EF", idx: 0, label: "EF", cat: "course" },
    { code: "EF", idx: 1, label: "EF", cat: "course" },
    { code: "SL", idx: 0, label: "SL", cat: "course" },
    { code: "VMA", idx: 0, label: "VMA", cat: "course" },
    { code: "RJ", idx: 0, label: "RJ", cat: "renfo" },
    { code: "RA", idx: 0, label: "RA", cat: "renfo" },
    { code: "RB", idx: 0, label: "RB", cat: "renfo" },
  ];

  const isPlanned = (code, idx) => {
    if (code === "EF") return count(prevues, "EF") > idx;
    return prevues.includes(code);
  };

  const isDone = (code, idx) => {
    if (code === "EF") return count(faites, "EF") > idx;
    return faites.includes(code);
  };

  const renderBox = (b, i) => {
    const planned = isPlanned(b.code, b.idx);
    const done = isDone(b.code, b.idx);
    const colorPlan = "#f59e0b";
    const colorDone = b.cat === "course" ? "#10b981" : "#059669";

    return (
      <div key={i} style={{
        width: 38,
        height: 38,
        borderRadius: 8,
        background: done ? colorDone + "22" : "#1e293b",
        border: `2px solid ${done ? colorDone : "#334155"}`,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        position: "relative",
      }}>
        <span style={{
          fontSize: 10,
          fontWeight: 700,
          color: done ? colorDone : planned ? colorPlan : "#475569",
        }}>
          {b.label}
        </span>

        {planned && !done && (
          <div style={{
            width: 7,
            height: 7,
            borderRadius: "50%",
            background: colorPlan,
            position: "absolute",
            bottom: 4,
          }} />
        )}

        {done && <div style={{ fontSize: 8, color: colorDone }}>✓</div>}
      </div>
    );
  };

  return (
    <div style={{
      background: "#0f172a",
      borderRadius: 10,
      padding: "12px 14px",
      marginBottom: 12,
      border: "1px solid #1e293b",
    }}>
      <div style={{
        fontSize: 11,
        color: "#64748b",
        textTransform: "uppercase",
        letterSpacing: 1,
        marginBottom: 10,
      }}>
        Vue semaine
      </div>

      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <div>
          <div style={{
            fontSize: 10,
            color: courseOk ? "#10b981" : "#475569",
            marginBottom: 6,
            fontWeight: 600,
          }}>
            🏃 COURSE {courseOk ? "✓" : ""}
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            {boxes.filter(b => b.cat === "course").map(renderBox)}
          </div>
        </div>

        <div>
          <div style={{
            fontSize: 10,
            color: renfoOk ? "#059669" : "#475569",
            marginBottom: 6,
            fontWeight: 600,
          }}>
            💪 RENFO {renfoOk ? "✓" : ""}
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            {boxes.filter(b => b.cat === "renfo").map(renderBox)}
          </div>
        </div>
      </div>
    </div>
  );
}

function CollapsibleSportPanel({ jour, jourIdx, weekSport, activeSem, updateJour, updateWeekSport }) {
  const [collapsed, setCollapsed] = useState(true);

  const faites = jour.sessionsFaites || [];
  const planningJours = weekSport?.planningJours || Array.from({ length: 7 }, () => []);
  const prevues = planningJours[jourIdx] || [];
  const allSessions = ["EF", "SL", "VMA", "RJ", "RA", "RB", "RAB"];

  const toggleFaite = (s) => {
    const arr = [...faites];
    const i = arr.indexOf(s);
    if (i >= 0) arr.splice(i, 1);
    else arr.push(s);

    updateJour(activeSem, jourIdx, "sessionsFaites", arr);
  };

  const togglePrevue = (s) => {
    const newPlanning = planningJours.map((d, i) => {
      if (i !== jourIdx) return d || [];

      const arr = [...(d || [])];
      const idx = arr.indexOf(s);
      if (idx >= 0) arr.splice(idx, 1);
      else arr.push(s);

      return arr;
    });

    updateWeekSport({
      ...(weekSport || EMPTY_WEEK_SPORT()),
      planningJours: newPlanning,
    });
  };

  const isActive = (s) => prevues.includes(s) || faites.includes(s);

  return (
    <div style={{
      background: "#1e293b",
      borderRadius: 14,
      border: "1px solid #334155",
    }}>
      <div style={{
        padding: "12px 16px",
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
      }}>
        <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 600 }}>
          🏃 Sport
        </div>

        <button onClick={() => setCollapsed(!collapsed)} style={{
          background: "#0f172a",
          border: "1px solid #334155",
          color: "#94a3b8",
          borderRadius: 6,
          width: 28,
          height: 28,
          cursor: "pointer",
          fontSize: 12,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
        }}>
          {collapsed ? "▼" : "▲"}
        </button>
      </div>

      <div style={{
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gap: 8,
        padding: "0 10px 6px",
      }}>
        <div style={{ fontSize: 11, color: "#f59e0b", textAlign: "center" }}>Planifié</div>
        <div style={{ fontSize: 11, color: "#10b981", textAlign: "center" }}>Réalisé</div>
      </div>

      <div style={{
        display: "flex",
        flexDirection: "column",
        gap: 6,
        padding: "0 10px 12px",
      }}>
        {allSessions
          .filter(s => !collapsed || isActive(s))
          .map(s => {
            const def = SESSION_DEFS[s];
            const isPrevue = prevues.includes(s);
            const isFaite = faites.includes(s);
            const doneColor = def.cat === "course" ? "#10b981" : "#8b5cf6";

            return (
              <div key={s} style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: 8,
              }}>
                <button onClick={() => togglePrevue(s)} style={{
                  padding: "5px 4px",
                  borderRadius: 99,
                  width: "100%",
                  border: `1.5px solid ${isPrevue ? "#f59e0b" : "#1e293b"}`,
                  background: isPrevue ? "#f59e0b22" : "#0f172a",
                  color: isPrevue ? "#f59e0b" : "#334155",
                  fontSize: 11,
                  fontWeight: 700,
                  cursor: "pointer",
                }}>
                  {s}
                </button>

                <button onClick={() => toggleFaite(s)} style={{
                  padding: "5px 4px",
                  borderRadius: 99,
                  width: "100%",
                  border: `1.5px solid ${isFaite ? doneColor : "#1e293b"}`,
                  background: isFaite ? doneColor + "33" : "#0f172a",
                  color: isFaite ? doneColor : "#334155",
                  fontSize: 11,
                  fontWeight: 700,
                  cursor: "pointer",
                }}>
                  {isFaite ? "✓ " : ""}{s}
                </button>
              </div>
            );
          })}

        {(!collapsed || prevues.includes("AUTRE") || faites.includes("AUTRE")) && (
          <div style={{
            display: "grid",
            gridTemplateColumns: "1fr 1fr",
            gap: 8,
            marginTop: 4,
          }}>
            <button onClick={() => togglePrevue("AUTRE")} style={{
              padding: "5px 10px",
              borderRadius: 99,
              border: `1.5px solid ${prevues.includes("AUTRE") ? "#f59e0b" : "#1e293b"}`,
              background: prevues.includes("AUTRE") ? "#f59e0b22" : "#0f172a",
              color: prevues.includes("AUTRE") ? "#f59e0b" : "#334155",
              fontSize: 12,
              fontWeight: 700,
              cursor: "pointer",
            }}>
              Autre
            </button>

            <button onClick={() => toggleFaite("AUTRE")} style={{
              padding: "5px 10px",
              borderRadius: 99,
              border: `1.5px solid ${faites.includes("AUTRE") ? "#10b981" : "#1e293b"}`,
              background: faites.includes("AUTRE") ? "#10b98133" : "#0f172a",
              color: faites.includes("AUTRE") ? "#10b981" : "#334155",
              fontSize: 12,
              fontWeight: 700,
              cursor: "pointer",
            }}>
              {faites.includes("AUTRE") ? "✓ " : ""}Autre
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function NutritionPanel({ jour, activeJour, activeSem, cibleKcal, deficitCibleJour, updateJour }) {
  const kcal = parseFloat(jour.kCalTotales) || 0;
  const garmin = parseFloat(jour.garminKcal) || 0;

  const hasKcal = kcal > 0;
  const hasGarmin = garmin > 0;

  const budgetMax = hasGarmin
    ? Math.round(garmin - deficitCibleJour)
    : cibleKcal;

  const restant = budgetMax - kcal;

  const kcalOk = hasKcal && kcal <= budgetMax + 80;

  return (
    <div style={{
      background: "#1e293b",
      borderRadius: 14,
      padding: "14px",
      border: "1px solid #334155",
      width: "100%",
    }}>
      <div style={{
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        marginBottom: 14,
        flexWrap: "wrap",
        gap: 8,
      }}>
        <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 600 }}>
          🍽️ Nutrition
        </div>

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <span style={{
            padding: "2px 8px",
            borderRadius: 6,
            fontSize: 11,
            background: "#f59e0b22",
            color: "#f59e0b",
          }}>
            🎯 Déficit visé : {deficitCibleJour} kcal
          </span>

          {hasGarmin ? (
            <>
              <span style={{
                padding: "2px 8px",
                borderRadius: 6,
                fontSize: 11,
                background: "#10b98122",
                color: "#10b981",
              }}>
                ⌚ Brûlé : {garmin} kcal
              </span>

              <span style={{
                padding: "2px 8px",
                borderRadius: 6,
                fontSize: 11,
                fontWeight: 700,
                background: "#6366f122",
                color: "#6366f1",
              }}>
                💡 Budget : {budgetMax} kcal
              </span>
            </>
          ) : (
            <span style={{
              padding: "2px 8px",
              borderRadius: 6,
              fontSize: 11,
              background: "#6366f122",
              color: "#6366f1",
            }}>
              🎯 Objectif calories : {cibleKcal} kcal
            </span>
          )}

          {hasKcal && (
            <span style={{
              padding: "2px 8px",
              borderRadius: 99,
              fontSize: 11,
              fontWeight: 700,
              background: kcalOk ? "#064e3b" : "#450a0a",
              color: kcalOk ? "#6ee7b7" : "#fca5a5",
            }}>
              {kcal} kcal {kcalOk ? "✓" : "✗"}
            </span>
          )}
        </div>
      </div>

      {hasKcal && (
        <div style={{
          display: "flex",
          alignItems: "center",
          gap: 8,
          marginBottom: 14,
        }}>
          <div style={{
            flex: 1,
            background: "#0f172a",
            borderRadius: 99,
            height: 6,
            overflow: "hidden",
          }}>
            <div style={{
              height: "100%",
              borderRadius: 99,
              width: `${Math.min((kcal / budgetMax) * 100, 100)}%`,
              background: kcal > budgetMax ? "#ef4444" : kcal > budgetMax * 0.9 ? "#f59e0b" : "#10b981",
              transition: "width 0.3s",
            }} />
          </div>

          <span style={{
            fontSize: 12,
            fontWeight: 700,
            whiteSpace: "nowrap",
            color: kcal > budgetMax ? "#ef4444" : kcal > budgetMax * 0.9 ? "#f59e0b" : "#10b981",
          }}>
            {restant >= 0 ? `reste ${restant}` : `dépassé ${Math.abs(restant)}`}
          </span>
        </div>
      )}

      <div style={{
        display: "flex",
        alignItems: "center",
        gap: 12,
        marginTop: 4,
        marginBottom: 12,
        flexWrap: "wrap",
      }}>
        <span style={{ fontSize: 13, color: "#94a3b8", whiteSpace: "nowrap" }}>
          🍴 Calories consommées
        </span>

        <input
          type="number"
          value={jour.kCalTotales}
          onChange={e => updateJour(activeSem, activeJour, "kCalTotales", e.target.value)}
          placeholder="ex: 1650"
          style={{
            width: 90,
            padding: "6px 8px",
            borderRadius: 8,
            border: `1.5px solid ${jour.kCalTotales ? "#10b981" : "#334155"}`,
            background: "#0f172a",
            color: "#f8fafc",
            fontSize: 13,
            textAlign: "center",
          }}
        />

        <span style={{ fontSize: 13, color: "#64748b" }}>kcal</span>
      </div>

      <div style={{
        display: "flex",
        alignItems: "center",
        gap: 10,
        paddingTop: 10,

const COURSE_CODES = ["EF", "SL", "VMA"];

function getMarathonData(data) {
  return data?._marathon || { finished: false, time: "" };
}

function getBodyCompositionData(data) {
  return data?._bodyComposition || { fatUnder27: false, muscleOver31: false };
}

function revealSecretText(encoded) {
  try {
    return decodeURIComponent(escape(atob(encoded)));
  } catch(e) {
    return "Récompense secrète";
  }
}

function parseMarathonTimeToSeconds(value) {
  if (!value) return null;
  const parts = String(value).trim().split(":").map(x => parseInt(x, 10));
  if (parts.some(x => isNaN(x))) return null;
  if (parts.length === 2) return parts[0] * 3600 + parts[1] * 60;
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  return null;
}

function countSessionsInWeeks(weeks, acceptedCodes) {
  return weeks.reduce((acc, w) => {
    return acc + (w.jours || []).reduce((dayAcc, j) => {
      return dayAcc + (j.sessionsFaites || []).filter(s => acceptedCodes.includes(s)).length;
    }, 0);
  }, 0);
}

function getMinWeight(allWeeks) {
  const weights = allWeeks
    .map(w => parseFloat(w.poidsLundi))
    .filter(w => !isNaN(w) && w > 0);
  return weights.length ? Math.min(...weights) : null;
}

function buildRewardsStatus({ allWeeks, allKpis, data, marathonData, bodyCompositionData }) {
  const minWeight = getMinWeight(allWeeks);
  const totalSL = countSessionsInWeeks(allWeeks, ["SL"]);
  const perfectWeeks = allKpis.filter(k => k.poidsOk === true && k.sportOk === true).length;
  const marathonSeconds = parseMarathonTimeToSeconds(marathonData.time);
  const completedWeeks = PLAN.filter(p => hasWeekData(data[p.sem])).length;
  const completedDays = allWeeks.reduce((acc, w) => {
    return acc + (w.jours || []).filter(j =>
      j.kCalTotales ||
      j.garminKcal ||
      (j.sessionsFaites && j.sessionsFaites.length > 0)
    ).length;
  }, 0);
  const runningPlanDone = Object.values(data?._runningPlanChecks || {}).filter(Boolean).length;

  const isGreenWeek = (sem) => {
    const k = allKpis[sem - 1];
    return hasWeekData(data[sem]) && k.poidsOk !== false && k.deficitOk !== false && k.sportOk !== false;
  };

  const blockStats = (start, end) => {
    const weeks = allWeeks.slice(start - 1, end);
    const greenWeeks = Array.from({ length: end - start + 1 }, (_, i) => start + i).filter(isGreenWeek).length;
    const sorties = countSessionsInWeeks(weeks, COURSE_CODES);
    return { greenWeeks, sorties };
  };

  const weightReward = (reward, threshold) => {
    const unlocked = minWeight !== null && minWeight < threshold;
    const progress = minWeight === null ? 0 : Math.max(0, Math.min(1, (70 - minWeight) / (70 - threshold)));
    const detail = minWeight === null ? "Poids non saisi" : `Meilleur poids : ${minWeight.toFixed(1)} kg`;
    const remaining = minWeight === null ? "Saisir un poids" : unlocked ? "Débloquée" : `Encore ${(minWeight - threshold + 0.1).toFixed(1)} kg environ`;
    return { ...reward, unlocked, progress, detail, remaining };
  };

  const blockReward = (reward, start, end) => {
    const stats = blockStats(start, end);
    const unlocked = stats.greenWeeks >= 3 && stats.sorties >= 12;
    const progress = Math.min(1, Math.min(stats.greenWeeks / 3, stats.sorties / 12));
    const missingGreen = Math.max(0, 3 - stats.greenWeeks);
    const missingRuns = Math.max(0, 12 - stats.sorties);
    const missing = [];
    if (missingGreen) missing.push(`${missingGreen} semaine${missingGreen > 1 ? "s" : ""} verte${missingGreen > 1 ? "s" : ""}`);
    if (missingRuns) missing.push(`${missingRuns} sortie${missingRuns > 1 ? "s" : ""}`);
    const detail = `${stats.greenWeeks}/3 semaines vertes · ${stats.sorties}/12 sorties`;
    return { ...reward, unlocked, progress, detail, remaining: unlocked ? "Débloquée" : `Encore ${missing.join(" + ")}` };
  };

  const perfectReward = (reward, target) => ({
    ...reward,
    unlocked: perfectWeeks >= target,
    progress: Math.min(1, perfectWeeks / target),
    detail: `${perfectWeeks}/${target} semaines parfaites`,
    remaining: perfectWeeks >= target ? "Débloquée" : `Encore ${target - perfectWeeks} semaine${target - perfectWeeks > 1 ? "s" : ""} parfaite${target - perfectWeeks > 1 ? "s" : ""}`,
  });

  const baseRewards = REWARDS.map(reward => {
    if (reward.id === 1) return weightReward(reward, 68);
    if (reward.id === 2) return weightReward(reward, 67);
    if (reward.id === 3) return weightReward(reward, 66);
    if (reward.id === 4) return weightReward(reward, 65);
    if (reward.id === 5) return weightReward(reward, 64);
    if (reward.id === 7) {
      const p5 = parseFloat(allWeeks[4]?.poidsLundi);
      const p8 = parseFloat(allWeeks[7]?.poidsLundi);
      const hasBoth = !isNaN(p5) && !isNaN(p8);
      const diff = hasBoth ? Math.abs(p8 - p5) : null;
      const unlocked = hasBoth && diff <= 1;
      return {
        ...reward,
        unlocked,
        progress: !hasBoth ? 0 : Math.max(0, Math.min(1, 1 - Math.max(0, diff - 1) / 2)),
        detail: hasBoth ? `Écart S8-S5 : ${diff.toFixed(1)} kg` : "Poids S5 et S8 requis",
        remaining: !hasBoth ? "Saisir les poids S5 et S8" : unlocked ? "Débloquée" : `Réduire l'écart de ${(diff - 1).toFixed(1)} kg`,
      };
    }
    if (reward.id === 8) return blockReward(reward, 1, 4);
    if (reward.id === 9) return blockReward(reward, 5, 8);
    if (reward.id === 10) return blockReward(reward, 9, 12);
    if (reward.id === 11) return blockReward(reward, 13, 16);
    if (reward.id === 12) return { ...reward, unlocked: totalSL >= 10, progress: Math.min(1, totalSL / 10), detail: `${totalSL}/10 SL réalisées`, remaining: totalSL >= 10 ? "Débloquée" : `Encore ${10 - totalSL} SL` };
    if (reward.id === 13) return { ...reward, unlocked: totalSL >= 14, progress: Math.min(1, totalSL / 14), detail: `${totalSL}/14 SL réalisées`, remaining: totalSL >= 14 ? "Débloquée" : `Encore ${14 - totalSL} SL` };
    if (reward.id === 14) return perfectReward(reward, 6);
    if (reward.id === 15) return perfectReward(reward, 9);
    if (reward.id === 16) return perfectReward(reward, 13);
    if (reward.id === 17) return perfectReward(reward, 16);
    if (reward.id === 18) return { ...reward, unlocked: !!marathonData.finished, progress: marathonData.finished ? 1 : 0, detail: marathonData.finished ? "Marathon terminé" : "À valider après la course", remaining: marathonData.finished ? "Débloquée" : "Cocher Finisher" };
    if (reward.id === 19) {
      const target = 3 * 3600 + 50 * 60;
      const unlocked = marathonSeconds !== null && marathonSeconds < target;
      return { ...reward, unlocked, progress: unlocked ? 1 : 0, detail: marathonData.time ? `Temps saisi : ${marathonData.time}` : "Temps à saisir après la course", remaining: unlocked ? "Débloquée" : "Saisir un temps < 3h50" };
    }
    if (reward.id === 20) {
      const fatOk = !!bodyCompositionData.fatUnder27;
      const muscleOk = !!bodyCompositionData.muscleOver31;
      const unlocked = fatOk && muscleOk;
      const progress = (fatOk ? 0.5 : 0) + (muscleOk ? 0.5 : 0);
      const missing = [];
      if (!fatOk) missing.push("gras < 27 %");
      if (!muscleOk) missing.push("muscle > 31 %");
      return {
        ...reward,
        unlocked,
        progress,
        detail: `${fatOk ? "✓" : "☐"} Gras < 27 % · ${muscleOk ? "✓" : "☐"} Muscle > 31 %`,
        remaining: unlocked ? "Débloquée" : `Encore : ${missing.join(" + ")}`,
      };
    }
    if (reward.id === 21) {
      return {
        ...reward,
        unlocked: runningPlanDone >= 55,
        progress: Math.min(1, runningPlanDone / 55),
        detail: `${runningPlanDone}/55 séances cochées`,
        remaining: runningPlanDone >= 55 ? "Débloquée" : `Encore ${55 - runningPlanDone} séance${55 - runningPlanDone > 1 ? "s" : ""}`,
      };
    }
    return { ...reward, unlocked: false, progress: 0, detail: "", remaining: "" };
  });

  const secretStartDate = new Date(2026, 9, 25);
  const secretToday = new Date();
  const secretA = parseFloat(revealSecretText("NjUuNQ=="));
  const secretB = parseInt(revealSecretText("NTU="), 10);
  const secretUnlocked = secretToday >= secretStartDate && !!marathonData.finished && minWeight !== null && minWeight <= secretA && runningPlanDone >= secretB;
  const secretRewardText = revealSecretText("VW4gY2FybmV0IEFyb3VuZCB0aGUgd29ybGQgZXQgMSBzdHlsbyBkb3LDqSBwb3VyIGxhIHByw6lwYXJhdGlvbiBTw6l2aWxsZSDinKg=");

  baseRewards.push({
    id: "secret-locked-chest",
    category: "🔐 Secret",
    name: secretUnlocked ? "Coffre secret ouvert" : "Coffre verrouillé",
    condition: secretUnlocked ? "Objectif secret validé" : "Cette récompense ne peut être débloquée qu'en fin de préparation. Les conditions seront révélées au moment opportun.",
    reward: secretUnlocked ? secretRewardText : "Mystère 🔐",
    unlocked: secretUnlocked,
    progress: secretUnlocked ? 1 : 0,
    detail: secretUnlocked ? "Tu as débloqué la récompense surprise." : "Coffre verrouillé",
    remaining: secretUnlocked ? "Débloquée" : "Conditions secrètes",
    secret: true,
    bonus: true,
  });

  return baseRewards;
}

        );

  );
}

function RunningPlanTab({ runningChecks, updateRunningPlanCheck, currentSem }) {
  const [showPastWeeks, setShowPastWeeks] = useState(false);
  const pastWeeks = RUNNING_PLAN.filter(w => w.week < currentSem);
  const visibleWeeks = RUNNING_PLAN.filter(w => w.week >= currentSem);

  const getWeekStats = (weekData) => {
    const realSessions = weekData.sessions.filter(s => !s.empty);
    const doneCount = realSessions.filter((_, idx) => runningChecks[`S${weekData.week}-${idx}`]).length;
    const totalCount = realSessions.length;
    const pct = totalCount ? doneCount / totalCount : 0;
    const complete = totalCount > 0 && doneCount === totalCount;
    return { doneCount, totalCount, pct, complete };
  };

  const getGroupStats = (weeks) => weeks.reduce((acc, weekData) => {
    const stats = getWeekStats(weekData);
    return { done: acc.done + stats.doneCount, total: acc.total + stats.totalCount };
  }, { done: 0, total: 0 });

  const renderSessionCell = (weekData, session, idx) => {
    const key = `S${weekData.week}-${idx}`;
    const done = !!runningChecks[key];

    if (session.empty) {
      return (
        <div key={idx} style={{
          background: "#0f172a",
          border: "1px dashed #334155",
          borderRadius: 10,
          minHeight: 74,
          color: "#334155",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 18,
          fontWeight: 800,
        }}>/</div>
      );
    }

    return (
      <button key={idx} onClick={() => updateRunningPlanCheck(key, !done)} style={{
        background: done ? "#064e3b" : "#1e293b",
        border: `1.5px solid ${done ? "#10b981" : "#334155"}`,
        borderRadius: 10,
        minHeight: 74,
        padding: "10px 8px",
        color: done ? "#d1fae5" : "#cbd5e1",
        cursor: "pointer",
        textAlign: "center",
        fontFamily: "inherit",
        boxShadow: done ? "0 0 0 1px #10b98133 inset" : "none",
      }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: done ? "#86efac" : "#e2e8f0", marginBottom: 4 }}>
          {done ? "✓ " : ""}{session.title}
        </div>
        {session.details && (
          <div style={{ fontSize: 11, lineHeight: 1.25, color: done ? "#bbf7d0" : "#94a3b8", whiteSpace: "pre-line" }}>
            {session.details}
          </div>
        )}
      </button>
    );
  };

  const renderWeekRow = (weekData) => {
    const { doneCount, totalCount, pct, complete } = getWeekStats(weekData);

    return (
      <div key={weekData.week} style={{
        display: "grid",
        gridTemplateColumns: "54px 1fr 1fr",
        gridTemplateRows: "auto auto",
        gap: 6,
        alignItems: "stretch",
        marginBottom: 10,

        <div style={{
          gridRow: "1 / span 2",

function getCurrentPlanningPosition() {
  const start = new Date(2026, 6, 6); // 6 juillet 2026
  const today = new Date();

  const diffDays = Math.floor(
    (today - start) / (1000 * 60 * 60 * 24)
  );

  if (diffDays < 0) {
    return { sem: 1, jour: 0 };
  }

  const sem = Math.min(
    Math.floor(diffDays / 7) + 1,
    16
  );

  const jour = Math.min(
    Math.max(diffDays % 7, 0),
    6
  );

  return { sem, jour };
}

      setImportText("");
    } catch(e) {

    }
  };

  const marathonData = getMarathonData(data);
  const runningChecks = data._runningPlanChecks || {};
  const bodyCompositionData = getBodyCompositionData(data);

  const updateRunningPlanCheck = (key, val) => {
    save({
      ...data,
      _runningPlanChecks: {
        ...runningChecks,
        [key]: val,
      }
    });
  };

  const updateMarathonField = (field, val) => {
    save({
      ...data,
      _marathon: {
        ...marathonData,

      }
    });
  };

  const updateBodyCompositionField = (field, val) => {
    save({
      ...data,
      _bodyComposition: {
        ...bodyCompositionData,
        [field]: val,
      }
    });
  };

  const kpiSem = (s) => {
    const plan = PLAN[s - 1];
    const w = getWeek(s);
    const joursData = w.jours;
    const sport = w.sport || EMPTY_WEEK_SPORT();
    const planningJours = sport.planningJours || Array.from({ length: 7 }, () => []);
    const cibleKcalDyn = getCibleKcalDynamique(plan, sport);

    const poids = parseFloat(w.poidsLundi) || null;
    const poidsOk = poids !== null && poids <= plan.ciblePoids + 0.2;

    const kcals = joursData.map(j => {
      const tot = parseFloat(j.kCalTotales);
      return !isNaN(tot) && tot > 0 ? tot : null;
    });

    const kcalsValides = kcals.filter(k => k !== null);
    const moyKcal = kcalsValides.length
      ? Math.round(kcalsValides.reduce((a, b) => a + b, 0) / kcalsValides.length)
      : null;

    const toutesSessionsFaites = joursData.flatMap(j => j.sessionsFaites || []);

    const courseOk =
      count(toutesSessionsFaites, "EF") >= 1 &&
      toutesSessionsFaites.includes("SL") &&
      toutesSessionsFaites.includes("VMA");

    const renfoOk =
      toutesSessionsFaites.includes("RJ") ||
      (toutesSessionsFaites.includes("RA") && toutesSessionsFaites.includes("RB")) ||
      toutesSessionsFaites.includes("RAB");

    const sportOk = toutesSessionsFaites.length === 0 ? null : courseOk && renfoOk;

    const planSessions = planningJours.flat().length;
    const faitSessions = toutesSessionsFaites.length;

    const deficitCible = DEFICIT_CIBLE[s] || 0;
    const deficitCibleJour = Math.round(deficitCible / 7);

    const sportJourOk = joursData.map((j, i) => {
      const prevues = planningJours[i] || [];
      const faites = j.sessionsFaites || [];

      if (prevues.length === 0 && faites.length === 0) return null;
      if (prevues.length === 0 && faites.length > 0) return true;

      return prevues.every(session => faites.includes(session));
    });

    const caloriesJourOk = joursData.map((j, i) => {
      const kcal = kcals[i];
      const garmin = parseFloat(j.garminKcal) || null;
      const cibleJour = cibleKcalDyn[i];

      if (!kcal) return null;

      if (garmin !== null) {
        return garmin - kcal >= deficitCibleJour - 50;
      }

      return kcal <= cibleJour + 80;
    });

    const joursOk = joursData.map((j, i) => {
      const sOk = sportJourOk[i];
      const cOk = caloriesJourOk[i];

      if (sOk === null && cOk === null) return null;
      if (sOk === false || cOk === false) return false;
      if (sOk === true || cOk === true) return true;

      return null;
    });

    let deficitReel = null;
    let deficitCumul = 0;
    let joursComplets = 0;

    joursData.forEach((j, i) => {
      const garmin = parseFloat(j.garminKcal);
      const cal = kcals[i];

      if (!isNaN(garmin) && garmin > 0 && cal !== null && cal > 0) {
        deficitCumul += garmin - cal;
        joursComplets++;
      }
    });

    if (joursComplets > 0) {
      deficitReel = Math.round(deficitCumul);
    }

    const deficitOk = deficitReel !== null && deficitReel >= deficitCible * 0.85;

    return {
      poids,
      poidsOk,
      moyKcal,
      faitSessions,
      planSessions,
      sportOk,
      joursOk,
      sportJourOk,
      caloriesJourOk,
      deficitCible,
      deficitReel,
      deficitOk,
    };
  };

  useEffect(() => {
    if (!loaded) return;
    const marathonDataForCheck = getMarathonData(data);

                🏃 Sessions sport réalisées vs planifiées
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {PLAN.map(p => {
                  const k = kpiSem(p.sem);
                  if (k.planSessions === 0) return null;

                  const pct = k.planSessions > 0 ? k.faitSessions / k.planSessions : 0;

                  return (
                    <div key={p.sem} style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                    }}>
                      <div style={{ width: 30, fontSize: 11, color: "#64748b" }}>
                        S{p.sem}
                      </div>

                      <div style={{
                        flex: 1,
                        background: "#0f172a",
                        borderRadius: 4,
                        height: 16,
                        overflow: "hidden",
                      }}>
                        <div style={{
                          height: "100%",
                          borderRadius: 4,
                          width: `${Math.min(pct * 100, 100)}%`,
                          background: pct >= 1 ? "#10b981" : pct > 0.5 ? "#f59e0b" : "#ef4444",
                          transition: "width 0.4s",
                        }} />
                      </div>

                      <div style={{
                        width: 40,
                        fontSize: 11,
                        color: "#94a3b8",
                        textAlign: "right",
                      }}>
                        {k.faitSessions}/{k.planSessions}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <button onClick={resetAll} style={{
              alignSelf: "flex-start",
              padding: "7px 14px",
              borderRadius: 8,
              fontSize: 12,
              cursor: "pointer",
              border: "1px solid #450a0a",
              background: "transparent",
              color: "#ef4444",
            }}>
              🗑 Tout réinitialiser
            </button>
          </div>
        )}

        {activeTab === "recompenses" && (
          <RewardsTab
            rewardsStatus={rewardsStatus}
            marathonData={marathonData}
            updateMarathonField={updateMarathonField}
            bodyCompositionData={bodyCompositionData}
            updateBodyCompositionField={updateBodyCompositionField}
          />
        )}

        {activeTab === "planRunning" && (
          <RunningPlanTab
            runningChecks={runningChecks}
            updateRunningPlanCheck={updateRunningPlanCheck}
            currentSem={currentPlanningPositionForTab.sem}
          />
        )}

        {rewardToast && (
          <div style={{
            position: "fixed",
            top: 18,
            left: "50%",
            transform: "translateX(-50%)",
            background: "linear-gradient(135deg, #064e3b, #0f172a)",
            border: "1px solid #10b981",
            borderRadius: 16,
            padding: "14px 18px",
            color: "#ecfdf5",
            zIndex: 300,
            boxShadow: "0 12px 40px #000a",
            maxWidth: 340,
            width: "calc(100% - 32px)",
          }}>
            <div style={{ fontSize: 12, color: "#a7f3d0", textTransform: "uppercase", letterSpacing: 1, fontWeight: 800 }}>
              🎉 Récompense débloquée
            </div>
            <div style={{ fontSize: 17, fontWeight: 800, marginTop: 6 }}>
              {rewardToast.name}
            </div>
            <div style={{ fontSize: 13, color: "#fef3c7", marginTop: 4 }}>
              🎁 {rewardToast.reward}
            </div>
          </div>
        )}

        {copyMsg && (
          <div style={{
            position: "fixed",
            bottom: 24,
            left: "50%",
            transform: "translateX(-50%)",
            background: "#1e293b",
            border: "1px solid #334155",
            borderRadius: 12,
            padding: "12px 20px",
            fontSize: 13,
            color: "#e2e8f0",
            zIndex: 100,
            display: "flex",
            gap: 12,
            alignItems: "center",
            boxShadow: "0 8px 32px #0008",
          }}>
            {copyMsg}

            <button onClick={() => setCopyMsg("")} style={{
              background: "none",
              border: "none",
              color: "#64748b",
              cursor: "pointer",
              fontSize: 16,
            }}>
              ✕
            </button>
          </div>
        )}

        {showExport && (
          <div style={{
            position: "fixed",
            inset: 0,
            background: "#000a",
            zIndex: 200,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 20,
          }}>
            <div style={{
              background: "#1e293b",
              borderRadius: 16,
              padding: 24,
              maxWidth: 500,
              width: "100%",
            }}>
              <div style={{
                fontSize: 15,
                color: "#f8fafc",
                fontWeight: 600,
                marginBottom: 12,
              }}>
                💾 Sauvegarde manuelle
              </div>

              <p style={{
                fontSize: 13,
                color: "#94a3b8",
                marginBottom: 12,
              }}>
                Copie ce texte et colle-le dans Notes ou un document :
              </p>

              <textarea
                readOnly
                value={JSON.stringify(data)}
                rows={6}
                onFocus={e => e.target.select()}
                style={{
                  width: "100%",
                  padding: 10,
                  borderRadius: 8,
                  background: "#0f172a",
                  border: "1px solid #334155",
                  color: "#94a3b8",
                  fontSize: 11,
                  fontFamily: "monospace",
                  resize: "none",
                }}
              />

              <button onClick={() => setShowExport(false)} style={{
                marginTop: 12,
                padding: "8px 20px",
                borderRadius: 8,
                border: "none",
                background: "#6366f1",
                color: "white",
                cursor: "pointer",
              }}>
                Fermer
              </button>
            </div>
          </div>
        )}

        {showImport && (
          <div style={{
            position: "fixed",
            inset: 0,
            background: "#000a",
            zIndex: 200,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 20,
          }}>
            <div style={{
              background: "#1e293b",
              borderRadius: 16,
              padding: 24,
              maxWidth: 500,
              width: "100%",
            }}>
              <div style={{
                fontSize: 15,
                color: "#f8fafc",
                fontWeight: 600,
                marginBottom: 12,
              }}>
                📂 Charger mes données
              </div>

              <p style={{
                fontSize: 13,
                color: "#94a3b8",
                marginBottom: 12,
              }}>
                Colle ici le texte sauvegardé précédemment :
              </p>

              <textarea
                value={importText}
                onChange={e => setImportText(e.target.value)}
                rows={6}
                placeholder="Colle ton JSON ici..."
                style={{
                  width: "100%",
                  padding: 10,
                  borderRadius: 8,
                  background: "#0f172a",
                  border: "1px solid #334155",
                  color: "#e2e8f0",
                  fontSize: 11,
                  fontFamily: "monospace",
                  resize: "none",
                }}
              />

              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={doImportText} style={{
                  flex: 1,
                  padding: "8px 20px",
                  borderRadius: 8,
                  border: "none",
                  background: "#6366f1",
                  color: "white",
                  cursor: "pointer",
                }}>
                  Importer
                </button>

                <button onClick={() => setShowImport(false)} style={{
                  padding: "8px 20px",
                  borderRadius: 8,
                  border: "1px solid #334155",
                  background: "none",
                  color: "#94a3b8",
                  cursor: "pointer",
                }}>
                  Annuler
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
</script>
</body>
</html>
