<script>
var scripts = [
  "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
];
var idx = 0;
function loadNext() {
  if (idx >= scripts.length) { startApp(); return; }
  var s = document.createElement('script');
  s.src = scripts[idx++];
  s.onload = loadNext;
  s.onerror = function() {
    document.getElementById('loading').innerHTML = '<div>❌ Erreur réseau</div><div style="font-size:13px;color:#64748b">Vérifie ta connexion et recharge</div>';
  };
  document.head.appendChild(s);
}
function startApp() {
  try {
    var appCode = document.getElementById('app-code').textContent;
    var transformed = Babel.transform(appCode, { presets: ['react'] }).code;
    eval(transformed);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('root').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div>❌ Erreur: ' + e.message.substring(0,120) + '</div>';
    console.error(e);
  }
}
loadNext();
</script>
<script id="app-code" type="text/plain">
const { useState, useEffect } = React;
 
 
// ── PLAN (déficit & poids cible par semaine) ──────────────────────────────────

const DEFICIT_CIBLE = {

const PLAN = [

  { sem: 2,  lundi: "13 juil",  phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 69.28, sessionsTargets: 4 },

  { sem: 5,  lundi: "3 août",   phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 68.34, sessionsTargets: 4 },
  { sem: 6,  lundi: "10 août",  phase: "Vacances",  cibleKcalJours: VAC, ciblePoids: 68.02, sessionsTargets: 3 },
  { sem: 7,  lundi: "17 août",  phase: "Vacances",  cibleKcalJours: VAC, ciblePoids: 68.02, sessionsTargets: 3 },
  { sem: 8,  lundi: "24 août",  phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 68.02, sessionsTargets: 4 },
  { sem: 9,  lundi: "31 août",  phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 67.71, sessionsTargets: 4 },
  { sem: 10, lundi: "7 sept",   phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 67.39, sessionsTargets: 4 },
  { sem: 11, lundi: "14 sept",  phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 67.08, sessionsTargets: 4 },
  { sem: 12, lundi: "21 sept",  phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 66.76, sessionsTargets: 4 },
  { sem: 13, lundi: "28 sept",  phase: "Marathon",  cibleKcalJours: P16, ciblePoids: 66.45, sessionsTargets: 4 },
  { sem: 14, lundi: "5 oct",    phase: "Marathon",  cibleKcalJours: AFF, ciblePoids: 66.13, sessionsTargets: 3 },
  { sem: 15, lundi: "12 oct",   phase: "Marathon",  cibleKcalJours: AFF, ciblePoids: 65.82, sessionsTargets: 3 },
  { sem: 16, lundi: "19 oct",   phase: "Marathon",  cibleKcalJours: AFF, ciblePoids: 65.50, sessionsTargets: 2 },
];
 
 
const JOURS = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
const PHASE_COLORS = {
  "Marathon": "#6366f1",
  "Vacances": "#10b981",
  "Affûtage": "#6366f1",
};
 
// Sessions disponibles
const SESSIONS_COURSE = ["EF", "SL", "VMA"];
const SESSIONS_RENFO = ["RJ", "RA", "RB", "RAB"];
 
const EMPTY_JOUR = () => ({
  sessionsFaites: [],   // ex: ["EF", "RA"]
  garminKcal: "",
  kCalTotales: "",
});
 
const EMPTY_WEEK_SPORT = () => ({
  // Planning semaine : sessions prévues (liste globale)
  coursesPrevues: [],   // ex: ["EF", "EF", "SL", "VMA"]
  renfoPrevus: [],      // ex: ["RJ", "RA", "RB"]
  autresPrevus: 0,      // nombre de "Autre" prévus
  // Placement par jour : sessions planifiées par jour
  planningJours: Array(7).fill(null).map(() => []),
});
 
const EMPTY_WEEK = () => ({
  poidsLundi: "",
  // Ancien planning texte (deprecated mais gardé pour compat)
  planningSport: ["", "", "", "", "", "", ""],
  // Nouveau planning structuré
  sport: EMPTY_WEEK_SPORT(),
  jours: Array(7).fill(null).map(() => EMPTY_JOUR()),
});
 
 
 
// ── CALCUL DYNAMIQUE DES OBJECTIFS CALORIQUES ────────────────────────────────
// Détecte le type de session depuis le texte du planning
function detectSessionType(text) {
  if (!text || text.trim() === "" || /repos|rest|off|rien/i.test(text)) return "repos";
  if (/sortie.?long|long.?run|sl\b|1h[23456]|1h[23456]0/i.test(text)) return "longue";
  return "sport";
}
 
function getCibleKcalDynamique(plan, planningSport) {
  // Phase 1 et Vacances : objectifs fixes
  if (plan.phase === "Phase 1" || plan.phase === "Vacances") return plan.cibleKcalJours;
 
  // Phase 2 : 1550 si repos, 1650 sinon (pas de sortie longue)
  if (plan.phase === "Phase 2") {
    return planningSport.map(s => {
      const type = detectSessionType(s);
      return type === "repos" ? 1550 : 1650;
    });
  }
 
  // Phase 3 : 1550 repos, 2000 sortie longue, 1650 sport normal
  return planningSport.map(s => {
    const type = detectSessionType(s);
    if (type === "repos") return 1550;
    if (type === "longue") return 2000;
    return 1650;
  });
}
 
 
 
// ── RÉSUMÉ SEMAINE ────────────────────────────────────────────────────────────
function WeekSummary({ weekSport, joursData }) {
  const sport = weekSport || { coursesPrevues: [], renfoPrevus: [], autresPrevus: 0, planningJours: Array(7).fill([]) };
 
  // Sessions planifiées = agrégation de tout ce qui est dans la colonne "Planifié" des 7 jours
  const planningJours = sport.planningJours || Array(7).fill([]);
  const prevues = planningJours.flatMap(jour => (jour||[]).flatMap(s => s === "RAB" ? ["RA", "RB"] : [s]));
 
  // Sessions réalisées (toutes les journées)
  const faites = joursData.flatMap(j => {
    const sessions = [...(j.sessionsFaites || [])];
    // RAB → compte comme RA + RB
    return sessions.flatMap(s => s === "RAB" ? ["RA", "RB", "RAB"] : [s]);
  });
 
  // Boxes fixes à afficher dans l'ordre
  const BOXES = [
    { code: "EF",  idx: 0, label: "EF",  color: "#6366f1", cat: "course" },
    { code: "EF",  idx: 1, label: "EF",  color: "#6366f1", cat: "course" },
    { code: "SL",  idx: 0, label: "SL",  color: "#8b5cf6", cat: "course" },
    { code: "VMA", idx: 0, label: "VMA", color: "#a855f7", cat: "course" },
    { code: "RJ",  idx: 0, label: "RJ",  color: "#10b981", cat: "renfo" },
    { code: "RA",  idx: 0, label: "RA",  color: "#059669", cat: "renfo" },
    { code: "RB",  idx: 0, label: "RB",  color: "#047857", cat: "renfo" },
  ];
 
  // Pour chaque box, combien de fois le code apparaît dans prévues/faites
  const countIn = (arr, code) => arr.filter(s => s === code).length;
 
  // Box EF : besoin de savoir si la 1ère / 2ème est planifiée/faite
  const efPrevues = countIn(prevues, "EF");
  const efFaites = countIn(faites, "EF");
 
  const isPlanned = (code, idx) => {
    if (code === "EF") return efPrevues > idx;
    return prevues.includes(code);
  };
 
  const isDone = (code, idx) => {
    if (code === "EF") return efFaites > idx;
    return faites.includes(code);
  };
 
  // Critères validation
  const courseOk = efFaites >= 1 && faites.includes("SL") && faites.includes("VMA");
  const renfoOk = faites.includes("RJ") || (faites.includes("RA") && faites.includes("RB")) || faites.includes("RAB");
 
  return (
    <div style={{ background: "#0f172a", borderRadius: 10, padding: "12px 14px", marginBottom: 12, border: "1px solid #1e293b" }}>
      <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
        Vue semaine
      </div>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        {/* Course */}
        <div>
          <div style={{ fontSize: 10, color: courseOk ? "#10b981" : "#475569", marginBottom: 6, fontWeight: 600 }}>
            🏃 COURSE {courseOk ? "✓" : ""}
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            {BOXES.filter(b => b.cat === "course").map((b, i) => {
              const planned = isPlanned(b.code, b.idx);
              const done = isDone(b.code, b.idx);
              const isCourse = b.cat === "course";
              const colorDark = isCourse ? "#059669" : "#7c3aed";
              return (
                <div key={i} style={{
                  width: 38, height: 38, borderRadius: 8,
                  background: done ? colorDark + "33" : "#1e293b",
                  border: `2px solid ${done ? colorDark : "#334155"}`,
                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                  position: "relative",
                }}>
                  <span style={{ fontSize: 10, fontWeight: 700,
                    color: done || planned ? colorDark : "#475569" }}>
                    {b.label}
                  </span>
                  {planned && !done && (
                    <div style={{
                      width: 7, height: 7, borderRadius: "50%",
                      background: colorDark, position: "absolute", bottom: 4,
                    }} />
                  )}
                  {done && (
                    <div style={{ fontSize: 8, color: colorDark }}>✓</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
 
        {/* Renfo */}
        <div>
          <div style={{ fontSize: 10, color: renfoOk ? "#8b5cf6" : "#475569", marginBottom: 6, fontWeight: 600 }}>
            💪 RENFO {renfoOk ? "✓" : ""}
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            {BOXES.filter(b => b.cat === "renfo").map((b, i) => {
              const planned = isPlanned(b.code, b.idx);
              const done = isDone(b.code, b.idx);
              return (
                <div key={i} style={{
                  width: 38, height: 38, borderRadius: 8,
                  background: done ? "#10b98133" : "#1e293b",
                  border: `2px solid ${done ? "#10b981" : planned ? "#10b98166" : "#334155"}`,
                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                  position: "relative",
                }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: done ? "#10b981" : planned ? "#10b98199" : "#475569" }}>
                    {b.label}
                  </span>
                  {planned && !done && (
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#10b981", position: "absolute", bottom: 4 }} />
                  )}
                  {done && (
                    <div style={{ fontSize: 8, color: "#10b981" }}>✓</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}
 
// ── SPORT PANEL v2 ────────────────────────────────────────────────────────────
const SESSION_DEFS = {
  EF:  { label: "EF",  desc: "Endurance fondamentale", color: "#10b981", cat: "course" },
  SL:  { label: "SL",  desc: "Sortie longue",           color: "#059669", cat: "course" },
  VMA: { label: "VMA", desc: "Vitesse maximale",         color: "#34d399", cat: "course" },
  RJ:  { label: "RJ",  desc: "Renfo jambes",             color: "#8b5cf6", cat: "renfo" },
  RA:  { label: "RA",  desc: "Renfo bras",               color: "#a855f7", cat: "renfo" },
  RB:  { label: "RB",  desc: "Renfo bras B",             color: "#7c3aed", cat: "renfo" },
  RAB: { label: "RAB", desc: "Renfo bras+jambes (light)",color: "#6d28d9", cat: "renfo" },
};
 
function SessionBadge({ code, active, onClick, small }) {
  const def = SESSION_DEFS[code] || { label: code, color: "#64748b", cat: "autre" };
  return (
    <button onClick={onClick} style={{
      padding: small ? "3px 8px" : "6px 12px",
      borderRadius: 99,
      border: `2px solid ${active ? def.color : "#334155"}`,
      background: active ? def.color + "33" : "transparent",
      color: active ? def.color : "#64748b",
      fontSize: small ? 11 : 13,
      fontWeight: 700,
      cursor: "pointer",
      fontFamily: "inherit",
      transition: "all 0.15s",
      letterSpacing: 0.5,
    }}>
      {def.label}
    </button>
  );
}
 
function SportWeekPanel({ weekSport, joursData, onUpdate }) {
  const sport = weekSport || { coursesPrevues: [], renfoPrevus: [], autresPrevus: 0, planningJours: Array(7).fill([]) };
 
  const toggleCourse = (s) => {
    const arr = [...(sport.coursesPrevues || [])];
    const idx = arr.indexOf(s);
    if (idx >= 0) arr.splice(idx, 1); else arr.push(s);
    onUpdate({ ...sport, coursesPrevues: arr });
  };
 
  const toggleRendoSem = (s) => {
    const arr = [...(sport.renfoPrevus || [])];
    const idx = arr.indexOf(s);
    if (idx >= 0) arr.splice(idx, 1); else arr.push(s);
    onUpdate({ ...sport, renfoPrevus: arr });
  };
 
  // Count EF planned
  const efCount = (sport.coursesPrevues || []).filter(s => s === "EF").length;
  const addEF = () => onUpdate({ ...sport, coursesPrevues: [...(sport.coursesPrevues||[]), "EF"] });
  const removeEF = () => {
    const arr = [...(sport.coursesPrevues||[])];
    const i = arr.lastIndexOf("EF");
    if (i >= 0) arr.splice(i, 1);
    onUpdate({ ...sport, coursesPrevues: arr });
  };
 
  const autresCount = sport.autresPrevus || 0;
 
  // Validation
  const toutPlanifie = [...(sport.coursesPrevues||[]), ...(sport.renfoPrevus||[])];
  const courseValide = toutPlanifie.includes("SL") && toutPlanifie.includes("VMA") && toutPlanifie.includes("EF");
  const renfoValide = toutPlanifie.includes("RJ") || (toutPlanifie.includes("RA") && toutPlanifie.includes("RB")) || toutPlanifie.includes("RAB");
 
  return (
    <div style={{ background: "#1e293b", borderRadius: 14, padding: "16px", border: "1px solid #334155", marginBottom: 12 }}>
      <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 600, marginBottom: 12 }}>
        📋 Planning semaine
      </div>
 
      {/* Résumé visuel */}
      <WeekSummary weekSport={weekSport} joursData={joursData || []} />
 
      {/* Course */}
      <div style={{ marginBottom: 10 }}>
        <div style={{ fontSize: 11, color: "#10b981", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>
          🏃 Course {courseValide ? "✓" : ""}
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          {/* EF avec compteur */}
          <div style={{ display: "flex", alignItems: "center", gap: 4, border: "2px solid #334155", borderRadius: 99, padding: "4px 8px" }}>
            <button onClick={removeEF} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 14, lineHeight: 1 }}>−</button>
            <span style={{ color: efCount > 0 ? "#6366f1" : "#64748b", fontWeight: 700, fontSize: 13, minWidth: 24, textAlign: "center" }}>
              {efCount}×EF
            </span>
            <button onClick={addEF} style={{ background: "none", border: "none", color: "#6366f1", cursor: "pointer", fontSize: 14, lineHeight: 1 }}>+</button>
          </div>
          {["SL", "VMA"].map(s => (
            <SessionBadge key={s} code={s}
              active={(sport.coursesPrevues||[]).includes(s)}
              onClick={() => toggleCourse(s)} />
          ))}
        </div>
      </div>
 
      {/* Renfo */}
      <div style={{ marginBottom: 10 }}>
        <div style={{ fontSize: 11, color: "#10b981", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>
          💪 Renfo {renfoValide ? "✓" : ""}
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {["RJ", "RA", "RB", "RAB"].map(s => (
            <SessionBadge key={s} code={s}
              active={(sport.renfoPrevus||[]).includes(s)}
              onClick={() => toggleRendoSem(s)} />
          ))}
        </div>
      </div>
 
      {/* Autre */}
      <div>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>➕ Autre</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => onUpdate({ ...sport, autresPrevus: Math.max(0, autresCount-1) })}
            style={{ background: "#1e293b", border: "1px solid #334155", color: "#64748b", borderRadius: 6, width: 28, height: 28, cursor: "pointer", fontSize: 16 }}>−</button>
          <span style={{ color: autresCount > 0 ? "#f59e0b" : "#64748b", fontWeight: 700, fontSize: 14 }}>{autresCount}</span>
          <button onClick={() => onUpdate({ ...sport, autresPrevus: autresCount+1 })}
            style={{ background: "#1e293b", border: "1px solid #334155", color: "#f59e0b", borderRadius: 6, width: 28, height: 28, cursor: "pointer", fontSize: 16 }}>+</button>
        </div>
      </div>
    </div>
  );
}
 
function SportDayPanel({ jour, jourIdx, weekSport, activeSem, updateJour, updateWeekSport }) {
  const faites = jour.sessionsFaites || [];
  const sport = weekSport || { coursesPrevues: [], renfoPrevus: [], autresPrevus: 0, planningJours: Array(7).fill([]) };
  const planningJours = sport.planningJours || Array(7).fill([]);
  const prevues = planningJours[jourIdx] || [];
 
  const toggleFaite = (s) => {
    const arr = [...faites];
    const i = arr.indexOf(s);
    if (i >= 0) arr.splice(i, 1); else arr.push(s);
    updateJour(activeSem, jourIdx, "sessionsFaites", arr);
  };
 
  const togglePrevue = (s) => {
    const newPlanning = (planningJours).map((d, i) => i === jourIdx ? (() => {
      const arr = [...(d||[])];
      const idx = arr.indexOf(s);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(s);
      return arr;
    })() : d);

function NutritionPanel({ jour, activeJour, activeSem, cibleKcal, deficitCibleJour, updateJour }) {
  const repas = [
    { key: "petitDejMacros", label: "🌅 Petit déj" },
    { key: "dejeunerMacros",  label: "☀️ Déjeuner" },
    { key: "collationMacros", label: "🍎 Collation" },
    { key: "dinerMacros",     label: "🌙 Dîner" },
  ];
 
  // Total : priorité total manuel > somme repas
  const sommeRepas = repas.reduce((acc, r) => acc + (jour[r.key]?.kcal || 0), 0);
  const totalManuel = parseFloat(jour.kCalTotales) || 0;
  const totalEffectif = totalManuel > 0 ? totalManuel : sommeRepas;
  const hasTotaux = totalEffectif > 0;
 
  // Budget basé sur Garmin si dispo
  const garmin = parseFloat(jour.garminKcal) || 0;
  const budgetMax = garmin > 0 ? Math.round(garmin - (deficitCibleJour || 0)) : cibleKcal;
  const restant = budgetMax - totalEffectif;
  const kcalOk = hasTotaux && totalEffectif <= budgetMax + 80;
 
  return (
    <div style={{ background: "#1e293b", borderRadius: 14, padding: "16px 20px", border: "1px solid #334155" }}>
      {/* Header budget */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 600 }}>🍽️ Nutrition</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {/* Déficit cible : toujours visible */}
          <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, background: "#f59e0b22", color: "#f59e0b" }}>
            🎯 Déficit visé : {deficitCibleJour} kcal
          </span>
          {garmin > 0 ? (
            <>
              <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, background: "#10b98122", color: "#10b981" }}>
                ⌚ Brûlé : {garmin} kcal
              </span>
              <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 700, background: "#6366f122", color: "#6366f1" }}>
                💡 Budget : {budgetMax} kcal
              </span>
            </>
          ) : (
            <span style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, background: "#6366f122", color: "#6366f1" }}>
              🎯 Objectif calories : {cibleKcal} kcal
            </span>
          )}
          {hasTotaux && (
            <span style={{
              padding: "2px 8px", borderRadius: 99, fontSize: 11, fontWeight: 700,
              background: kcalOk ? "#064e3b" : "#450a0a",
              color: kcalOk ? "#6ee7b7" : "#fca5a5",
            }}>{totalEffectif} kcal {kcalOk ? "✓" : "✗"}</span>
          )}
        </div>
      </div>
 
      {/* Barre de progression */}
      {hasTotaux && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <div style={{ flex: 1, background: "#0f172a", borderRadius: 99, height: 6, overflow: "hidden" }}>
            <div style={{
              height: "100%", borderRadius: 99,
              width: `${Math.min((totalEffectif / budgetMax) * 100, 100)}%`,
              background: totalEffectif > budgetMax ? "#ef4444" : totalEffectif > budgetMax * 0.9 ? "#f59e0b" : "#10b981",
              transition: "width 0.3s",
            }} />
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, whiteSpace: "nowrap",
            color: totalEffectif > budgetMax ? "#ef4444" : totalEffectif > budgetMax * 0.9 ? "#f59e0b" : "#10b981" }}>
            {restant >= 0 ? `reste ${restant}` : `dépassé ${Math.abs(restant)}`}
          </span>
        </div>
      )}
 
      {/* Total journée uniquement */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 4 }}>
        <span style={{ fontSize: 13, color: "#94a3b8", whiteSpace: "nowrap" }}>📅 Calories du jour</span>
        <input type="number"
          value={jour.kCalTotales}
          onChange={e => updateJour(activeSem, activeJour, "kCalTotales", e.target.value)}
          placeholder="ex: 1650"
          style={{
            width: 130, padding: "10px 14px", borderRadius: 8,
            border: `1.5px solid ${jour.kCalTotales ? "#10b981" : "#334155"}`,
            background: "#0f172a", color: "#f8fafc", fontSize: 15, fontFamily: "inherit",
          }}
        />
        <span style={{ fontSize: 13, color: "#64748b" }}>kcal</span>
      </div>
    </div>
  );
}

  // KPI calc
  const kpiSem = (s) => {

    // Poids
    const poids = parseFloat(w.poidsLundi) || null;

    // Objectifs caloriques dynamiques selon planning sport
    const cibleKcalDyn = getCibleKcalDynamique(plan, w.planningSport);
 
    // Calories — objectif par jour
    const kcals = joursData.map(j => {
      const tot = parseFloat(j.kCalTotales);
      if (!isNaN(tot) && tot > 0) return tot;
      // Somme des macros calculés par repas
      const macros = [j.petitDejMacros, j.dejeunerMacros, j.collationMacros, j.dinerMacros];
      const sum = macros.reduce((a, m) => a + (m?.kcal || 0), 0);
      return sum > 0 ? sum : null;
    });
    const kcalsValides = kcals.filter(k => k !== null);
    const moyKcal = kcalsValides.length ? Math.round(kcalsValides.reduce((a, b) => a + b, 0) / kcalsValides.length) : null;
    // Objectif moyen de la semaine

    const aVMA = toutesSessionsFaites.includes("VMA");
    const courseOk = aEF && aSL && aVMA;
 
    // Critère renfo : RJ OU (RA+RB) OU RAB
    const aRJ = toutesSessionsFaites.includes("RJ");

    const aRB = toutesSessionsFaites.includes("RB");
    const aRAB = toutesSessionsFaites.includes("RAB");
    const renfoOk = aRJ || (aRA && aRB) || aRAB;
 
    const sportOk = toutesSessionsFaites.length === 0 ? null : (courseOk && renfoOk);
    const planSessions = sport.coursesPrevues.length + sport.renfoPrevus.length + sport.autresPrevus;
    const faitSessions = toutesSessionsFaites.length;
 
    // Par jour : deux critères séparés

    const planningJours = sport.planningJours || Array(7).fill([]);

      if (prevues.length === 0 && faites.length > 0) return true; // bonus
      // Toutes les sessions prévues ont été faites ?
      const toutFait = prevues.every(s => faites.includes(s));
      return toutFait ? true : false;

    const caloriesJourOk = joursData.map((j, i) => {
      const kcal = kcals[i];
      const garmin = parseFloat(j.garminKcal) || null;
      const cibleJour = cibleKcalDyn[i];
      if (!kcal) return null;
      if (garmin !== null) {
        return (garmin - kcal) >= deficitCibleJour - 50;
      }
      return kcal <= cibleJour + 80;
    });
 
    // joursOk global (pour compatibilité) = les deux ok

      if (s === false || c === false) return false;
      if (s === true || c === true) return true;
      return null;
    });
 
    // Déficit réel = somme kcal brûlées estimées - kcal mangées (sur jours avec données)

                const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
                const yMin = 64, yMax = 70;
                const xS = i => pad.l + (i / (chartData.length - 1)) * cW;
                const yS = v => pad.t + cH - ((v - yMin) / (yMax - yMin)) * cH;

                  const s = []; let cur = [];
                  chartData.forEach((d, i) => {
                    if (d[key] != null) cur.push(xS(i)+","+yS(d[key]));

            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }}>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, maxWidth: 500, width: "100%" }}>
              <div style={{ fontSize: 15, color: "#f8fafc", fontWeight: 600, marginBottom: 12 }}>
                📂 Charger mes données
              </div>
              <p style={{ fontSize: 13, color: "#94a3b8", marginBottom: 12 }}>
                Colle ici le texte sauvegardé précédemment :
              </p>
              <textarea
                value={importText}
                onChange={e => setImportText(e.target.value)}
                rows={6}
                placeholder='Colle ton JSON ici...'
                style={{
                  width: "100%", padding: 10, borderRadius: 8, background: "#0f172a",
                  border: "1px solid #334155", color: "#e2e8f0", fontSize: 11,
                  fontFamily: "monospace", boxSizing: "border-box", resize: "none",
                }}
              />
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={doImportText} style={{
                  flex: 1, padding: "8px 20px", borderRadius: 8, border: "none",
                  background: "#6366f1", color: "white", cursor: "pointer", fontFamily: "inherit",
                }}>Importer</button>
                <button onClick={() => setShowImport(false)} style={{
                  padding: "8px 20px", borderRadius: 8, border: "1px solid #334155",
                  background: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit",
                }}>Annuler</button>
              </div>
            </div>
          </div>
        )}
 
      </div>
    </div>
  );
}
 
 
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
